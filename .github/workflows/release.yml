name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            goarm: ""
          - goarch: arm64
            goarm: ""
          - goarch: arm
            goarm: "6"
            suffix: armel
          - goarch: arm
            goarm: "7"
            suffix: armhf
          - goarch: "386"
            goarm: ""
          - goarch: mips64le
            goarm: ""
          - goarch: ppc64le
            goarm: ""
          - goarch: riscv64
            goarm: ""
          - goarch: s390x
            goarm: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine binary name
        id: name
        run: |
          ARCH="${{ matrix.goarch }}"
          SUFFIX="${{ matrix.suffix }}"
          if [ -n "$SUFFIX" ]; then
            echo "bin=gosu-${SUFFIX}" >> "$GITHUB_OUTPUT"
          else
            # Normalize arch names to match upstream gosu release naming
            case "$ARCH" in
              386)      echo "bin=gosu-i386" >> "$GITHUB_OUTPUT" ;;
              mips64le) echo "bin=gosu-mips64el" >> "$GITHUB_OUTPUT" ;;
              ppc64le)  echo "bin=gosu-ppc64el" >> "$GITHUB_OUTPUT" ;;
              *)        echo "bin=gosu-${ARCH}" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build -v \
            -ldflags="-s -w" \
            -o "${{ steps.name.outputs.bin }}" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.bin }}
          path: ${{ steps.name.outputs.bin }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum gosu-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gosu-*
            dist/SHA256SUMS
          generate_release_notes: true
